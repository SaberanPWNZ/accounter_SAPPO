services:
  backend:
    build: ./backend
    container_name: accounter_backend
    restart: unless-stopped
    volumes:
      - db_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: accounter_frontend
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      - backend

volumes:
  db_data:
